<div class="search-box">
  <select [(ngModel)]="selectedPracticeArea" >
    @for (practiceArea of practiceAreas; track practiceArea) {
      <option [value]="practiceArea">{{ practiceArea }}</option>
    }
    </select>
  <select [(ngModel)]="selectedLocation">
    @for (location of locations; track location) {
      <option [value]="location">{{ location }}</option>
    }
  </select>
  <button class="search-button" (click)="onSearch()">Search</button>
</div>
